<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e0f12">
<meta name="color-scheme" content="dark">
<title>Vinyl Mixset</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#0e0f12;
  --panel:#16181d;
  --line:rgba(255,255,255,.07);
  --ink:#f4f5f7;
  --gray:#9298a2;
  --faint:#5d636d;
  --accent:#ff4d7d;
  --accent-soft:rgba(255,77,125,.13);
  --accent-text:#ff87a8;
  --down:#5aa9ff;
  --sans:'Pretendard Variable',Pretendard,-apple-system,system-ui,'Apple SD Gothic Neo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);min-height:100%;overscroll-behavior-y:none}
html{color-scheme:dark}
body{
  color:var(--ink);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:560px;margin:0 auto;padding:0 20px calc(48px + env(safe-area-inset-bottom))}
.num{font-variant-numeric:tabular-nums}

/* ── header ─────────────────────────── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 0 18px;
}
h1{font-size:16px;font-weight:700;letter-spacing:-.01em}
.h-right{display:flex;align-items:center;gap:8px}
.chip{
  display:inline-flex;align-items:center;
  height:30px;padding:0 12px;
  border:1px solid var(--line);
  border-radius:999px;
  font-size:12px;font-weight:600;
  color:var(--gray);
  background:none;
  font-family:var(--sans);
  cursor:default;
}
button.chip{cursor:pointer}
.chip.on{color:var(--accent-text);border-color:rgba(255,77,125,.45)}

/* ── NOW 스트립 ─────────────────────── */
.nowstrip{
  display:flex;align-items:center;gap:10px;
  padding:11px 2px;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.label{
  flex:none;
  font-size:11px;font-weight:700;letter-spacing:.12em;
  color:var(--faint);
}
.nowstrip .t{
  flex:1;min-width:0;
  font-size:13.5px;font-weight:500;color:var(--gray);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.nowstrip .b{flex:none;font-size:13.5px;font-weight:700;color:var(--gray)}

/* ── NEXT 히어로 ────────────────────── */
.hero{
  margin-top:14px;
  padding:18px 18px 17px;
  border-radius:20px;
  background:var(--panel);
  border:1px solid var(--line);
}
.hero-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.hero-top .label{color:var(--accent-text)}
.pos-chip{
  display:inline-flex;align-items:center;
  height:28px;padding:0 12px;
  border-radius:999px;
  background:var(--accent-soft);
  color:var(--accent-text);
  font-size:13.5px;font-weight:700;letter-spacing:.02em;
}
.hero .title{
  font-size:22px;font-weight:700;line-height:1.3;letter-spacing:-.015em;
  word-break:keep-all;overflow-wrap:anywhere;
}
.hero .artist{font-size:14px;color:var(--gray);margin-top:4px}
.hero .bpmrow{
  display:flex;align-items:baseline;gap:8px;
  margin-top:14px;
}
.hero .bpm{font-size:36px;font-weight:800;line-height:1;letter-spacing:-.02em}
.hero .bpmunit{font-size:12px;font-weight:600;color:var(--faint)}
.delta{font-size:14px;font-weight:700}
.delta.up{color:var(--accent-text)}
.delta.down{color:var(--down)}
.delta.flat{color:var(--faint)}
.hero .memo{
  margin-top:14px;padding-top:13px;
  border-top:1px solid var(--line);
  font-size:13.5px;line-height:1.62;color:var(--gray);
  white-space:pre-line;word-break:keep-all;overflow-wrap:anywhere;
}
.hero .done{
  padding:6px 0 2px;
  font-size:15px;color:var(--gray);
}

/* ── 컨트롤 버튼 ────────────────────── */
.controls{display:flex;gap:10px;margin-top:14px}
.btn{
  height:54px;
  border:none;border-radius:14px;
  font-family:var(--sans);
  font-size:15.5px;font-weight:700;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s;
}
.btn:disabled{opacity:.35;cursor:default}
.btn-back{
  flex:1;
  background:none;
  border:1px solid var(--line);
  color:var(--gray);
}
.btn-next{
  flex:2;
  background:var(--accent);
  color:#fff;
}
.btn-next:active:not(:disabled){opacity:.85}
.btn-back:active:not(:disabled){opacity:.7}

/* ── 리스트 ─────────────────────────── */
.sec{
  padding:30px 2px 8px;
  font-size:11px;font-weight:700;letter-spacing:.12em;
  color:var(--faint);
}
.row{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  column-gap:16px;
  padding:14px 12px;
  margin:0 -12px;
  border-radius:14px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
  transition:opacity .18s;
}
.row:active{background:rgba(255,255,255,.05)}
.row.past{opacity:.35}
.row.cur{
  background:rgba(255,255,255,.045);
  border-bottom-color:transparent;
  box-shadow:inset 2px 0 0 var(--accent);
}
.row .meta{
  font-size:11.5px;font-weight:600;color:var(--faint);
  margin-bottom:4px;
}
.row .meta .tag{color:var(--accent-text);margin-left:6px;letter-spacing:.08em}
.row .title{
  font-size:15.5px;font-weight:600;line-height:1.35;
  word-break:keep-all;overflow-wrap:anywhere;
}
.row .artist{font-size:12.5px;color:var(--gray);margin-top:2px}
.row .side{text-align:right;padding-top:19px}
.row .bpm{font-size:20px;font-weight:700;line-height:1}
.row .side .delta{display:block;font-size:11px;margin-top:4px}
.row .memo{
  grid-column:1/-1;
  margin-top:9px;
  font-size:13px;line-height:1.6;color:var(--gray);
  white-space:pre-line;word-break:keep-all;overflow-wrap:anywhere;
}

/* ── etc ────────────────────────────── */
.empty{padding:56px 0;text-align:center;color:var(--faint);font-size:14px}
footer{padding-top:28px;font-size:11px;color:var(--faint);text-align:center}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Vinyl Mixset</h1>
    <div class="h-right">
      <button class="chip" id="wake" hidden>화면유지 OFF</button>
      <span class="chip num" id="count"></span>
    </div>
  </header>

  <div class="nowstrip" id="nowstrip"></div>
  <div class="hero" id="hero"></div>
  <div class="controls">
    <button class="btn btn-back" id="btnBack">이전</button>
    <button class="btn btn-next" id="btnNext">셋 시작</button>
  </div>

  <div class="sec">SETLIST</div>
  <main id="list"></main>

  <footer id="sync">불러오는 중…</footer>
</div>

<script>
/* ═══ Apps Script 배포 URL ═══ */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgamll5_pbVCplJW5iHLpGhNpRiJtrNwNYWn0Xau9i6NZMHduAmWvAQ9rZ6_GYLowg/exec";

const CACHE_KEY = "vinylMixset";
const NOW_KEY = "vinylMixset.now";
let DATA = [], ORDER = [];
let nowIdx = -1; // -1 = 시작 전

const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const hhmm = t => new Date(t).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
const fmtNo = v => { const s = String(v ?? "").trim(); return /^\d+$/.test(s) ? s.padStart(2,"0") : s; };
const posLine = d => [fmtNo(d.no), d.pos].filter(Boolean).join(" · ");

/* ── 셋 순서(No 오름차순) + BPM 델타 ── */
function buildOrder(){
  ORDER = DATA.map((d,i)=>({...d,i})).sort((a,b)=>{
    const na = parseFloat(a.no), nb = parseFloat(b.no);
    const ka = isNaN(na) ? 1e9 + a.i : na, kb = isNaN(nb) ? 1e9 + b.i : nb;
    return ka - kb;
  });
  for(let i=0;i<ORDER.length;i++){
    const cur = parseFloat(ORDER[i].bpm), prev = i>0 ? parseFloat(ORDER[i-1].bpm) : NaN;
    ORDER[i].delta = (!isNaN(cur) && !isNaN(prev)) ? Math.round((cur-prev)*10)/10 : null;
  }
}
const deltaHtml = d => {
  if(d === null || d === undefined) return "";
  const cls = d>0 ? "up" : d<0 ? "down" : "flat";
  const txt = d>0 ? "+"+d : d<0 ? String(d) : "±0";
  return `<span class="delta ${cls} num">${txt}</span>`;
};

/* ── 진행 상태 저장/복원 ── */
function saveNow(){
  if(nowIdx < 0){ localStorage.removeItem(NOW_KEY); return; }
  const t = ORDER[nowIdx];
  localStorage.setItem(NOW_KEY, JSON.stringify({t:t.title, p:t.pos}));
}
function restoreNow(){
  try{
    const s = JSON.parse(localStorage.getItem(NOW_KEY));
    if(!s) return;
    let i = ORDER.findIndex(d => d.title===s.t && d.pos===s.p);
    if(i < 0) i = ORDER.findIndex(d => d.title===s.t);
    nowIdx = i;
  }catch(e){ nowIdx = -1; }
}

/* ── 스테이지 (NOW 스트립 + NEXT 히어로 + 버튼) ── */
function renderStage(){
  const n = ORDER.length;
  const cur = nowIdx >= 0 ? ORDER[nowIdx] : null;
  const nxt = ORDER[nowIdx + 1] || null;

  /* count: 시작 전엔 곡수, 진행 중엔 n/전체 */
  $("count").textContent = cur ? `${nowIdx+1} / ${n}` : `${n}곡`;

  /* NOW 스트립 */
  if(cur){
    $("nowstrip").innerHTML =
      `<span class="label">NOW</span>
       <span class="t">${esc(posLine(cur))} &nbsp; ${esc(cur.title)}${cur.artist ? " — " + esc(cur.artist) : ""}</span>
       <span class="b num">${esc(cur.bpm)}</span>`;
  }else{
    $("nowstrip").innerHTML =
      `<span class="label">READY</span>
       <span class="t">아직 시작 전 — 아래 버튼으로 첫 트랙 시작</span>`;
  }

  /* NEXT 히어로 */
  const target = cur ? nxt : ORDER[0];
  if(!n){
    $("hero").innerHTML = `<p class="done">시트에 트랙이 없음</p>`;
  }else if(target){
    $("hero").innerHTML =
      `<div class="hero-top">
        <span class="label">${cur ? "NEXT" : "FIRST"}</span>
        <span class="pos-chip">${esc(posLine(target))}</span>
      </div>
      <h2 class="title">${esc(target.title)}</h2>
      <p class="artist">${esc(target.artist)}</p>
      <div class="bpmrow">
        <span class="bpm num">${esc(target.bpm)}</span>
        <span class="bpmunit">BPM</span>
        ${cur ? deltaHtml(target.delta) : ""}
      </div>
      ${target.memo ? `<p class="memo">${esc(target.memo)}</p>` : ""}`;
  }else{
    $("hero").innerHTML =
      `<div class="hero-top"><span class="label">END</span></div>
       <p class="done">마지막 트랙 재생 중 — 셋 마무리</p>`;
  }

  /* 버튼 상태 */
  $("btnBack").disabled = nowIdx < 0;
  const bn = $("btnNext");
  if(!n){ bn.disabled = true; bn.textContent = "다음 트랙"; }
  else if(nowIdx < 0){ bn.disabled = false; bn.textContent = "셋 시작"; }
  else if(nxt){ bn.disabled = false; bn.textContent = "다음 트랙"; }
  else { bn.disabled = true; bn.textContent = "셋 종료"; }
}

/* ── 리스트 ── */
function renderList(){
  if(!ORDER.length){
    $("list").innerHTML = `<p class="empty">트랙 없음</p>`;
    return;
  }
  let html = "";
  ORDER.forEach((d,i)=>{
    const cls = i===nowIdx ? "cur" : (nowIdx>=0 && i<nowIdx) ? "past" : "";
    const tag = i===nowIdx ? `<span class="tag">NOW</span>` : (nowIdx>=0 && i===nowIdx+1) ? `<span class="tag">NEXT</span>` : "";
    html += `
    <article class="row ${cls}" data-i="${i}">
      <div>
        <p class="meta num">${esc(posLine(d))}${tag}</p>
        <h3 class="title">${esc(d.title)}</h3>
        <p class="artist">${esc(d.artist)}</p>
      </div>
      <div class="side">
        <div class="bpm num">${esc(d.bpm)}</div>
        ${deltaHtml(d.delta)}
      </div>
      ${d.memo ? `<p class="memo">${esc(d.memo)}</p>` : ""}
    </article>`;
  });
  $("list").innerHTML = html;
}

function update(){ renderStage(); renderList(); }
function setNow(i){
  nowIdx = Math.max(-1, Math.min(i, ORDER.length - 1));
  saveNow();
  update();
}

/* ── 인터랙션 ── */
$("btnNext").addEventListener("click", ()=> setNow(nowIdx + 1));
$("btnBack").addEventListener("click", ()=> setNow(nowIdx - 1));
$("list").addEventListener("click", e => {
  const row = e.target.closest(".row");
  if(!row) return;
  setNow(+row.dataset.i);
  window.scrollTo({top:0, behavior:"smooth"});
});

/* ── Wake Lock (화면 꺼짐 방지) ── */
let wakeLock = null, wakeIntent = false;
async function acquireWake(){
  try{
    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", ()=>{ wakeLock = null; });
    return true;
  }catch(e){ return false; }
}
function wakeUI(){
  $("wake").classList.toggle("on", wakeIntent);
  $("wake").textContent = "화면유지 " + (wakeIntent ? "ON" : "OFF");
}
if("wakeLock" in navigator){
  $("wake").hidden = false;
  $("wake").addEventListener("click", async ()=>{
    if(wakeIntent){
      wakeIntent = false;
      if(wakeLock){ wakeLock.release(); wakeLock = null; }
    }else{
      wakeIntent = await acquireWake();
    }
    wakeUI();
  });
  document.addEventListener("visibilitychange", async ()=>{
    if(wakeIntent && document.visibilityState === "visible" && !wakeLock){
      wakeIntent = await acquireWake();
      wakeUI();
    }
  });
}

/* ── 데이터 로드 ── */
async function load(){
  const cached = (()=>{ try{ return JSON.parse(localStorage.getItem(CACHE_KEY)); }catch(e){ return null; } })();

  const apply = (tracks, syncMsg) => {
    DATA = tracks || [];
    buildOrder();
    restoreNow();
    $("sync").textContent = syncMsg;
    update();
  };

  if(!SCRIPT_URL){
    apply(cached ? cached.tracks : [], cached ? "캐시 · " + hhmm(cached.t) : "SCRIPT_URL 미설정");
    return;
  }

  try{
    const r = await fetch(SCRIPT_URL);
    const j = await r.json();
    localStorage.setItem(CACHE_KEY, JSON.stringify({t:Date.now(), tracks:j.tracks || []}));
    apply(j.tracks, "동기화 " + hhmm(Date.now()));
  }catch(e){
    if(cached) apply(cached.tracks, "오프라인 · " + hhmm(cached.t) + " 캐시");
    else apply([], "불러오기 실패 — 네트워크 확인");
  }
}

load();
</script>
</body>
</html>
