<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1d2025">
<meta name="color-scheme" content="dark">
<title>Vinyl Mixset</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#1d2025;
  --card-hi:#23272d;
  --card-lo:#171a1e;
  --sh-dark:rgba(0,0,0,.55);
  --sh-light:rgba(255,255,255,.05);
  --ink:#e9ebee;
  --dim:#9aa0a8;
  --memo:#a6acb4;
  --faint:#6a7078;
  --pink:#ff3d7f;
  --violet:#8b5cff;
  --cyan:#38e8ff;
  --grad:linear-gradient(92deg,#ff3d7f,#8b5cff 55%,#38e8ff);
  --sans:'Pretendard Variable',Pretendard,-apple-system,system-ui,'Apple SD Gothic Neo',sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);min-height:100%;overscroll-behavior-y:none}
html{color-scheme:dark}
body{
  color:var(--ink);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:560px;margin:0 auto;padding:0 20px calc(48px + env(safe-area-inset-bottom))}

/* ── masthead ───────────────────────── */
header{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:30px 2px 20px;
}
h1{
  font-size:clamp(30px,9vw,38px);
  font-weight:800;
  letter-spacing:-.02em;
  line-height:1.05;
  color:transparent;
  background:var(--grad);
  -webkit-background-clip:text;
  background-clip:text;
  filter:drop-shadow(0 0 18px rgba(139,92,255,.35));
}
.count{
  font:600 12px/1 var(--mono);
  color:var(--dim);
  font-variant-numeric:tabular-nums;
  padding:7px 12px;
  border-radius:999px;
  box-shadow:inset 3px 3px 6px var(--sh-dark), inset -3px -3px 6px var(--sh-light);
  margin-bottom:6px;
  white-space:nowrap;
}

/* ── NOW / NEXT 스티키 바 ─────────────── */
.nowbar{
  position:sticky;top:10px;z-index:20;
  display:flex;align-items:center;gap:12px;
  margin-bottom:18px;
  padding:11px 12px 11px 15px;
  border-radius:18px;
  background:var(--bg);
  box-shadow:7px 7px 14px var(--sh-dark), -7px -7px 14px var(--sh-light);
  cursor:pointer;
  user-select:none;
}
.nb-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.nb-row{display:flex;align-items:center;gap:9px;min-width:0}
.nb-label{
  flex:none;width:36px;
  font:800 9px/1 var(--mono);letter-spacing:.1em;
  background:var(--grad);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.nb-label.c{background:none;color:var(--cyan)}
.nb-label.f{background:none;color:var(--faint)}
.nb-text{
  flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.nb-row.now .nb-text{font-size:12.5px;font-weight:500;color:var(--dim)}
.nb-row.next .nb-text{font-size:13.5px;font-weight:700;color:var(--ink)}
.nb-bpm{
  flex:none;
  font-weight:800;font-variant-numeric:tabular-nums;
}
.nb-row.now .nb-bpm{font-size:13px;color:var(--dim)}
.nb-row.next .nb-bpm{
  font-size:15px;
  background:var(--grad);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}

/* ── 화면유지 토글 ─────────────────────── */
.wake{
  flex:none;border:none;cursor:pointer;
  font:700 10px/1.5 var(--mono);letter-spacing:.04em;
  color:var(--faint);
  background:var(--bg);
  padding:8px 10px;
  border-radius:12px;
  box-shadow:inset 3px 3px 6px var(--sh-dark), inset -3px -3px 6px var(--sh-light);
  text-align:center;
  transition:color .15s;
}
.wake.on{
  color:#fff;
  background:var(--grad);
  box-shadow:3px 3px 8px var(--sh-dark), 0 0 14px rgba(255,61,127,.35);
}

/* ── delta 공통 ───────────────────────── */
.delta{font:600 10.5px/1 var(--mono)}
.delta.up{color:var(--pink)}
.delta.down{color:var(--cyan)}
.delta.flat{color:var(--faint)}

/* ── card ─────────────────────────────── */
.card{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  column-gap:18px;
  padding:17px 18px 16px;
  margin-bottom:16px;
  border-radius:20px;
  border:1.5px solid transparent;
  background:linear-gradient(145deg, var(--card-hi), var(--card-lo));
  box-shadow:7px 7px 14px var(--sh-dark), -7px -7px 14px var(--sh-light);
  cursor:pointer;
  user-select:none;
  transition:opacity .18s, box-shadow .15s;
}
.card:active{box-shadow:3px 3px 8px var(--sh-dark), -3px -3px 8px var(--sh-light)}
.card.past{opacity:.35}
.card.now{
  background:linear-gradient(145deg, var(--card-hi), var(--card-lo)) padding-box, var(--grad) border-box;
  box-shadow:7px 7px 14px var(--sh-dark), -7px -7px 14px var(--sh-light), 0 0 22px rgba(139,92,255,.25);
}
.main{min-width:0}
.pos{
  display:inline-block;
  font:600 11px/1 var(--mono);
  letter-spacing:.03em;
  color:var(--cyan);
  padding:5px 10px;
  border-radius:999px;
  box-shadow:inset 3px 3px 6px var(--sh-dark), inset -3px -3px 6px rgba(56,232,255,.08);
  margin-bottom:10px;
  vertical-align:middle;
}
.nexttag{
  font:800 9px/1 var(--mono);letter-spacing:.12em;
  background:var(--grad);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-left:8px;
  vertical-align:middle;
}
.title{
  font-size:16.5px;
  font-weight:700;
  line-height:1.35;
  letter-spacing:-.01em;
  word-break:keep-all;
  overflow-wrap:anywhere;
}
.artist{
  font-size:13px;
  color:var(--dim);
  margin-top:3px;
}
.side{
  padding-top:26px;
  text-align:right;
}
.bpm{
  font-size:26px;
  font-weight:800;
  line-height:1;
  font-variant-numeric:tabular-nums;
  letter-spacing:-.02em;
  background:var(--grad);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.side .delta{display:block;margin-top:5px}
.memo{
  grid-column:1/-1;
  margin-top:13px;
  padding-top:12px;
  border-top:1px solid rgba(0,0,0,.45);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  font-size:13.5px;
  line-height:1.62;
  color:var(--memo);
  white-space:pre-line;
  word-break:keep-all;
  overflow-wrap:anywhere;
}

/* ── etc ────────────────────────────── */
.empty{
  padding:64px 0;
  text-align:center;
  color:var(--faint);
  font-size:14px;
}
footer{
  padding-top:26px;
  font-size:11px;
  color:var(--faint);
  text-align:center;
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Vinyl Mixset</h1>
    <span class="count" id="count"></span>
  </header>

  <div class="nowbar" id="nowbar">
    <div class="nb-main" id="nbmain"></div>
    <button class="wake" id="wake" hidden>화면유지<br>OFF</button>
  </div>

  <main id="list"></main>

  <footer id="sync">불러오는 중…</footer>
</div>

<script>
/* ═══ Apps Script 배포 URL ═══ */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgamll5_pbVCplJW5iHLpGhNpRiJtrNwNYWn0Xau9i6NZMHduAmWvAQ9rZ6_GYLowg/exec";

const CACHE_KEY = "vinylMixset";
const NOW_KEY = "vinylMixset.now";
let DATA = [];   // 원본
let ORDER = [];  // 셋 순서(No 오름차순) + delta 계산본
let nowIdx = -1; // ORDER 기준 현재 트랙, -1 = 시작 전

const $list = document.getElementById("list");
const $count = document.getElementById("count");
const $sync = document.getElementById("sync");
const $nbmain = document.getElementById("nbmain");
const $wake = document.getElementById("wake");
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const hhmm = t => new Date(t).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
const fmtNo = v => { const s = String(v ?? "").trim(); return /^\d+$/.test(s) ? s.padStart(2,"0") : s; };

/* ── 셋 순서 확정 + BPM 델타 계산 ── */
function buildOrder(){
  ORDER = DATA.map((d,i)=>({...d,i})).sort((a,b)=>{
    const na = parseFloat(a.no), nb = parseFloat(b.no);
    const ka = isNaN(na) ? 1e9 + a.i : na, kb = isNaN(nb) ? 1e9 + b.i : nb;
    return ka - kb;
  });
  for(let i=0;i<ORDER.length;i++){
    const cur = parseFloat(ORDER[i].bpm), prev = i>0 ? parseFloat(ORDER[i-1].bpm) : NaN;
    ORDER[i].delta = (!isNaN(cur) && !isNaN(prev)) ? Math.round((cur-prev)*10)/10 : null;
  }
}

const deltaHtml = d => {
  if(d === null || d === undefined) return "";
  const cls = d>0 ? "up" : d<0 ? "down" : "flat";
  const txt = d>0 ? "+"+d : d<0 ? String(d) : "±0";
  return `<span class="delta ${cls}">${txt}</span>`;
};

/* ── 현재 트랙 저장/복원 ── */
function saveNow(){
  if(nowIdx < 0){ localStorage.removeItem(NOW_KEY); return; }
  const t = ORDER[nowIdx];
  localStorage.setItem(NOW_KEY, JSON.stringify({t:t.title, p:t.pos}));
}
function restoreNow(){
  try{
    const s = JSON.parse(localStorage.getItem(NOW_KEY));
    if(!s) return;
    let i = ORDER.findIndex(d => d.title===s.t && d.pos===s.p);
    if(i < 0) i = ORDER.findIndex(d => d.title===s.t);
    nowIdx = i;
  }catch(e){ nowIdx = -1; }
}

/* ── 렌더 ── */
function render(){
  $count.textContent = ORDER.length + "곡";

  if(!ORDER.length){
    $list.innerHTML = `<p class="empty">트랙 없음</p>`;
    renderBar();
    return;
  }

  let html = "";
  ORDER.forEach((d, i) => {
    const cls = i===nowIdx ? "now" : (nowIdx>=0 && i<nowIdx) ? "past" : "";
    const posLine = [fmtNo(d.no), d.pos].filter(Boolean).join(" · ");
    const tag = (nowIdx>=0 && i===nowIdx+1) ? `<span class="nexttag">NEXT</span>` : "";
    html += `
    <article class="card ${cls}" data-i="${i}">
      <div class="main">
        ${posLine ? `<span class="pos">${esc(posLine)}</span>` : ""}${tag}
        <h2 class="title">${esc(d.title)}</h2>
        <p class="artist">${esc(d.artist)}</p>
      </div>
      <div class="side">
        <div class="bpm">${esc(d.bpm)}</div>
        ${deltaHtml(d.delta)}
      </div>
      ${d.memo ? `<p class="memo">${esc(d.memo)}</p>` : ""}
    </article>`;
  });
  $list.innerHTML = html;
  renderBar();
}

const trackLine = d => esc([ [fmtNo(d.no), d.pos].filter(Boolean).join("·"), d.title ].filter(Boolean).join("  "));

function renderBar(){
  if(!ORDER.length){ $nbmain.innerHTML = `<div class="nb-row next"><span class="nb-text">시트에 트랙을 추가해</span></div>`; return; }

  let rows = "";
  if(nowIdx < 0){
    const first = ORDER[0];
    rows += `<div class="nb-row now"><span class="nb-label f">SET</span><span class="nb-text">카드를 탭해서 현재 트랙 지정</span></div>`;
    rows += `<div class="nb-row next"><span class="nb-label">START</span><span class="nb-text">${trackLine(first)}</span><span class="nb-bpm">${esc(first.bpm)}</span></div>`;
  }else{
    const cur = ORDER[nowIdx], nxt = ORDER[nowIdx+1];
    rows += `<div class="nb-row now"><span class="nb-label">NOW</span><span class="nb-text">${trackLine(cur)}</span><span class="nb-bpm">${esc(cur.bpm)}</span></div>`;
    if(nxt){
      rows += `<div class="nb-row next"><span class="nb-label c">NEXT</span><span class="nb-text">${trackLine(nxt)}</span><span class="nb-bpm">${esc(nxt.bpm)} ${deltaHtml(nxt.delta)}</span></div>`;
    }else{
      rows += `<div class="nb-row next"><span class="nb-label f">END</span><span class="nb-text">마지막 트랙</span></div>`;
    }
  }
  $nbmain.innerHTML = rows;
}

/* ── 인터랙션 ── */
$list.addEventListener("click", e => {
  const card = e.target.closest(".card");
  if(!card) return;
  const i = +card.dataset.i;
  nowIdx = (i === nowIdx) ? -1 : i;
  saveNow();
  render();
});

document.getElementById("nowbar").addEventListener("click", e => {
  if(e.target.closest(".wake")) return;
  const target = document.querySelector(".card.now") || document.querySelector(".card");
  target && target.scrollIntoView({behavior:"smooth", block:"center"});
});

/* ── Wake Lock (화면 꺼짐 방지) ── */
let wakeLock = null, wakeIntent = false;
async function acquireWake(){
  try{
    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", ()=>{ wakeLock = null; });
    return true;
  }catch(e){ return false; }
}
function wakeUI(){
  $wake.classList.toggle("on", wakeIntent);
  $wake.innerHTML = "화면유지<br>" + (wakeIntent ? "ON" : "OFF");
}
if("wakeLock" in navigator){
  $wake.hidden = false;
  $wake.addEventListener("click", async e => {
    e.stopPropagation();
    if(wakeIntent){
      wakeIntent = false;
      if(wakeLock){ wakeLock.release(); wakeLock = null; }
    }else{
      wakeIntent = await acquireWake();
    }
    wakeUI();
  });
  document.addEventListener("visibilitychange", async ()=>{
    if(wakeIntent && document.visibilityState === "visible" && !wakeLock){
      wakeIntent = await acquireWake();
      wakeUI();
    }
  });
}

/* ── 데이터 로드 ── */
async function load(){
  const cached = (()=>{ try{ return JSON.parse(localStorage.getItem(CACHE_KEY)); }catch(e){ return null; } })();

  const apply = (tracks, syncMsg) => {
    DATA = tracks || [];
    buildOrder();
    restoreNow();
    $sync.textContent = syncMsg;
    render();
  };

  if(!SCRIPT_URL){
    apply(cached ? cached.tracks : [], cached ? "캐시 · " + hhmm(cached.t) : "SCRIPT_URL 미설정");
    return;
  }

  try{
    const r = await fetch(SCRIPT_URL);
    const j = await r.json();
    localStorage.setItem(CACHE_KEY, JSON.stringify({t:Date.now(), tracks:j.tracks || []}));
    apply(j.tracks, "동기화 " + hhmm(Date.now()));
  }catch(e){
    if(cached) apply(cached.tracks, "오프라인 · " + hhmm(cached.t) + " 캐시");
    else apply([], "불러오기 실패 — 네트워크 확인");
  }
}

load();
</script>
</body>
</html>
