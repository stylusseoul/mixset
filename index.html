<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07070c">
<meta name="color-scheme" content="dark">
<title>Vinyl Mixset</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#07070c;
  --ink:#fff;
  --dim:rgba(255,255,255,.55);
  --memo:rgba(255,255,255,.62);
  --faint:rgba(255,255,255,.38);
  --glass:rgba(255,255,255,.05);
  --glass-line:rgba(255,255,255,.1);
  --pink:#ff3d7f;
  --violet:#8b5cff;
  --cyan:#38e8ff;
  --grad:linear-gradient(92deg,#ff3d7f,#8b5cff 55%,#38e8ff);
  --sans:'Pretendard Variable',Pretendard,-apple-system,system-ui,'Apple SD Gothic Neo',sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);min-height:100%;overscroll-behavior-y:none}
html{color-scheme:dark}
body{
  color:var(--ink);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ── 배경 글로우 ─────────────────────── */
.glow{
  position:fixed;border-radius:50%;
  filter:blur(90px);
  pointer-events:none;z-index:0;
}
.g1{width:340px;height:340px;left:-120px;top:-80px;background:rgba(255,61,127,.42);animation:drift1 26s ease-in-out infinite alternate}
.g2{width:300px;height:300px;right:-110px;top:220px;background:rgba(139,92,255,.4);animation:drift2 32s ease-in-out infinite alternate}
.g3{width:320px;height:320px;left:-60px;bottom:-140px;background:rgba(56,232,255,.28);animation:drift3 29s ease-in-out infinite alternate}
@keyframes drift1{to{transform:translate(50px,40px) scale(1.12)}}
@keyframes drift2{to{transform:translate(-60px,60px) scale(1.08)}}
@keyframes drift3{to{transform:translate(40px,-50px)}}
@media (prefers-reduced-motion:reduce){.glow{animation:none}}

.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:0 18px calc(48px + env(safe-area-inset-bottom))}

/* ── masthead ───────────────────────── */
header{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:30px 2px 18px;
}
h1{
  font-size:clamp(30px,9vw,38px);
  font-weight:800;
  letter-spacing:-.02em;
  line-height:1.05;
  background:var(--grad);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  filter:drop-shadow(0 0 22px rgba(139,92,255,.35));
}
.count{
  font:600 12px/1 var(--mono);
  color:var(--dim);
  font-variant-numeric:tabular-nums;
  padding:6px 11px;
  border-radius:999px;
  background:var(--glass);
  border:1px solid var(--glass-line);
  backdrop-filter:blur(14px) saturate(150%);
  -webkit-backdrop-filter:blur(14px) saturate(150%);
  margin-bottom:5px;
  white-space:nowrap;
}

/* ── 정렬 (플로팅 글래스 세그먼트) ────── */
.sorts{
  position:sticky;top:10px;z-index:20;
  display:flex;gap:2px;
  width:fit-content;
  margin:0 auto 16px;
  padding:4px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--glass-line);
  backdrop-filter:blur(20px) saturate(170%);
  -webkit-backdrop-filter:blur(20px) saturate(170%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12), 0 8px 28px rgba(0,0,0,.45);
}
.sort{
  background:none;border:none;cursor:pointer;
  font-family:var(--sans);
  font-size:12.5px;font-weight:600;
  color:var(--dim);
  padding:7px 14px;
  border-radius:999px;
  transition:color .15s;
}
.sort[aria-pressed="true"]{
  color:#fff;
  background:var(--grad);
  box-shadow:0 4px 16px rgba(255,61,127,.35), 0 4px 16px rgba(139,92,255,.3);
}

/* ── crate divider ──────────────────── */
.crate{
  display:flex;align-items:center;gap:12px;
  padding:22px 4px 10px;
}
.crate span{
  font:700 13px/1 var(--mono);
  background:var(--grad);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.crate i{flex:1;height:1px;background:var(--glass-line)}

/* ── card (글래스 패널) ───────────────── */
.card{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  column-gap:18px;
  padding:16px 17px 15px;
  margin-bottom:10px;
  border-radius:18px;
  background:var(--glass);
  border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(16px) saturate(150%);
  -webkit-backdrop-filter:blur(16px) saturate(150%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1);
}
@supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
  .card{background:rgba(22,22,32,.88)}
  .sorts{background:rgba(22,22,32,.92)}
  .count{background:rgba(22,22,32,.88)}
}
.main{min-width:0}
.pos{
  display:inline-block;
  font:600 11px/1 var(--mono);
  letter-spacing:.03em;
  color:var(--cyan);
  background:rgba(56,232,255,.1);
  border:1px solid rgba(56,232,255,.28);
  padding:4px 9px;
  border-radius:999px;
  margin-bottom:9px;
}
.title{
  font-size:16.5px;
  font-weight:700;
  line-height:1.35;
  letter-spacing:-.01em;
  word-break:keep-all;
  overflow-wrap:anywhere;
}
.artist{
  font-size:13px;
  color:var(--dim);
  margin-top:3px;
}
.bpm{
  font-size:26px;
  font-weight:800;
  line-height:1;
  font-variant-numeric:tabular-nums;
  letter-spacing:-.02em;
  padding-top:26px;
  text-align:right;
}
.memo{
  grid-column:1/-1;
  margin-top:12px;
  padding-top:11px;
  border-top:1px solid rgba(255,255,255,.08);
  font-size:13.5px;
  line-height:1.62;
  color:var(--memo);
  white-space:pre-line;
  word-break:keep-all;
  overflow-wrap:anywhere;
}

/* ── etc ────────────────────────────── */
.empty{
  padding:64px 0;
  text-align:center;
  color:var(--faint);
  font-size:14px;
}
footer{
  padding-top:26px;
  font-size:11px;
  color:var(--faint);
  text-align:center;
}
</style>
</head>
<body>
<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="glow g3"></div>

<div class="wrap">

  <header>
    <h1>Vinyl Mixset</h1>
    <span class="count" id="count"></span>
  </header>

  <div class="sorts" id="sorts" role="group" aria-label="정렬">
    <button class="sort" data-sort="sheet" aria-pressed="true">시트순</button>
    <button class="sort" data-sort="pos">위치</button>
    <button class="sort" data-sort="bpm">BPM</button>
    <button class="sort" data-sort="artist">아티스트</button>
  </div>

  <main id="list"></main>

  <footer id="sync">불러오는 중…</footer>
</div>

<script>
/* ═══ 여기에 Apps Script 배포 URL 붙여넣기 ═══ */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgamll5_pbVCplJW5iHLpGhNpRiJtrNwNYWn0Xau9i6NZMHduAmWvAQ9rZ6_GYLowg/exec";

const CACHE_KEY = "vinylMixset";
let DATA = [];
let sort = "sheet";

const $list = document.getElementById("list");
const $count = document.getElementById("count");
const $sync = document.getElementById("sync");
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const hhmm = t => new Date(t).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
const fmtNo = v => { const s = String(v ?? "").trim(); return /^\d+$/.test(s) ? s.padStart(2,"0") : s; };

/* 위치 자연정렬: A10이 A2 뒤에 오도록 */
const posKey = p => {
  const m = /^([A-Za-z]+)\s*(\d+)/.exec(p || "");
  return m ? [m[1].toUpperCase(), +m[2]] : ["\uffff", 999];
};

function render(){
  let rows = DATA.map((d,i)=>({...d,i}));

  if(sort==="pos") rows.sort((a,b)=>{
    const [la,na]=posKey(a.pos),[lb,nb]=posKey(b.pos);
    return la===lb ? na-nb : la<lb?-1:1;
  });
  else if(sort==="bpm") rows.sort((a,b)=>(parseFloat(a.bpm)||999)-(parseFloat(b.bpm)||999));
  else if(sort==="artist") rows.sort((a,b)=>String(a.artist).localeCompare(String(b.artist),'ja'));
  else rows.sort((a,b)=>{
    const na = parseFloat(a.no), nb = parseFloat(b.no);
    const ka = isNaN(na) ? 1e9 + a.i : na, kb = isNaN(nb) ? 1e9 + b.i : nb;
    return ka - kb;
  });

  $count.textContent = rows.length + "곡";

  if(!rows.length){
    $list.innerHTML = `<p class="empty">트랙 없음</p>`;
    return;
  }

  let html = "", crate = null;
  for(const d of rows){
    if(sort==="pos"){
      const letter = posKey(d.pos)[0];
      if(letter !== crate){
        crate = letter;
        html += `<div class="crate"><span>${esc(letter)}</span><i></i></div>`;
      }
    }
    const posLine = [fmtNo(d.no), d.pos].filter(Boolean).join(" · ");
    html += `
    <article class="card">
      <div class="main">
        ${posLine ? `<span class="pos">${esc(posLine)}</span>` : ""}
        <h2 class="title">${esc(d.title)}</h2>
        <p class="artist">${esc(d.artist)}</p>
      </div>
      <div class="bpm">${esc(d.bpm)}</div>
      ${d.memo ? `<p class="memo">${esc(d.memo)}</p>` : ""}
    </article>`;
  }
  $list.innerHTML = html;
}

async function load(){
  const cached = (()=>{ try{ return JSON.parse(localStorage.getItem(CACHE_KEY)); }catch(e){ return null; } })();

  if(!SCRIPT_URL){
    if(cached){ DATA = cached.tracks; $sync.textContent = "캐시 · " + hhmm(cached.t); }
    else $sync.textContent = "SCRIPT_URL 미설정";
    render();
    return;
  }

  try{
    const r = await fetch(SCRIPT_URL);
    const j = await r.json();
    DATA = j.tracks || [];
    localStorage.setItem(CACHE_KEY, JSON.stringify({t:Date.now(), tracks:DATA}));
    $sync.textContent = "동기화 " + hhmm(Date.now());
  }catch(e){
    if(cached){
      DATA = cached.tracks;
      $sync.textContent = "오프라인 · " + hhmm(cached.t) + " 캐시";
    }else{
      $sync.textContent = "불러오기 실패 — 네트워크 확인";
    }
  }
  render();
}

document.getElementById("sorts").addEventListener("click", e => {
  const btn = e.target.closest(".sort");
  if(!btn) return;
  sort = btn.dataset.sort;
  document.querySelectorAll(".sort").forEach(p => p.setAttribute("aria-pressed", p===btn));
  render();
});

load();
</script>
</body>
</html>
