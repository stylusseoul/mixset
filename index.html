<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e0f12">
<meta name="color-scheme" content="dark">
<title>Vinyl Mixset</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#0e0f12;
  --panel:#16181d;
  --line:rgba(255,255,255,.07);
  --ink:#f4f5f7;
  --gray:#9298a2;
  --faint:#5d636d;
  --accent:#5F4B8B;            /* Pantone Ultra Violet */
  --accent-tx:#A89BD4;
  --down:#5aa9ff;
  --over:#eba14c;
  --bar:84px;                  /* 하단 고정 바 높이 */
  --sans:'Pretendard Variable',Pretendard,-apple-system,system-ui,'Apple SD Gothic Neo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);overscroll-behavior-y:none}
html{color-scheme:dark}
body{
  color:var(--ink);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.num{font-variant-numeric:tabular-nums}

/* ── 고정 프레임 ─────────────────────── */
.app{
  display:flex;flex-direction:column;
  height:100vh;height:100dvh;
  max-width:560px;margin:0 auto;
  padding:0 20px var(--bar);
}

/* ── header ─────────────────────────── */
header{
  flex:none;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0 12px;
}
h1{font-size:16px;font-weight:700;letter-spacing:-.01em}
.h-right{display:flex;align-items:center;gap:8px}
.chip{
  display:inline-flex;align-items:center;
  height:30px;padding:0 12px;
  border:1px solid var(--line);
  border-radius:999px;
  font-size:12px;font-weight:600;
  color:var(--gray);
  background:none;
  font-family:var(--sans);
  cursor:default;
}
button.chip{cursor:pointer}
.chip.on{color:var(--accent-tx);border-color:rgba(168,155,212,.5)}

/* ── NOW 카드 ───────────────────────── */
.nowcard{
  flex:none;
  padding:13px 16px 12px;
  border-radius:16px;
  background:var(--accent);
  border:1px solid rgba(255,255,255,.16);
  box-shadow:0 6px 24px rgba(95,75,139,.35);
}
.nowcard.ready{
  background:#1a1d23;
  border-color:rgba(255,255,255,.12);
  box-shadow:none;
}
.nowcard .top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:#fff;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{50%{opacity:.25}}
@media (prefers-reduced-motion:reduce){.dot{animation:none}}
.label{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--faint)}
.nowcard .top .label{color:#fff}
.nowcard.ready .top .label{color:var(--faint)}
.nowcard .top .p{margin-left:auto;font-size:12px;font-weight:600;color:rgba(255,255,255,.72)}
.nowcard .body{display:flex;align-items:center;gap:14px}
.nowcard .tw{flex:1;min-width:0}
.nowcard .title{
  font-size:16.5px;font-weight:700;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.nowcard .artist{
  font-size:12.5px;color:rgba(255,255,255,.72);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.nowcard .bpm{flex:none;font-size:25px;font-weight:800;line-height:1;letter-spacing:-.02em}
.nowcard.ready .title{color:var(--gray);font-weight:500}

/* ── NEXT 히어로 ────────────────────── */
.hero{
  flex:none;
  margin-top:10px;
  padding:16px 18px 15px;
  border-radius:20px;
  background:var(--panel);
  border:1px solid var(--line);
}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hero-top .label{color:#8f83bd}
.pos-chip{
  display:inline-flex;align-items:center;
  height:28px;padding:0 12px;
  border-radius:999px;
  background:rgba(95,75,139,.16);
  color:#9a8ec6;
  font-size:13.5px;font-weight:700;letter-spacing:.02em;
}
.hero .title{
  color:#c6cad2;
  font-size:21px;font-weight:700;line-height:1.3;letter-spacing:-.015em;
  word-break:keep-all;overflow-wrap:anywhere;
}
.hero .artist{font-size:13.5px;color:#7e848e;margin-top:3px}
.hero .bpmrow{display:flex;align-items:baseline;gap:8px;margin-top:11px}
.hero .bpm{color:#c6cad2;font-size:34px;font-weight:800;line-height:1;letter-spacing:-.02em}
.hero .bpmunit{font-size:12px;font-weight:600;color:var(--faint)}
.delta{font-size:13.5px;font-weight:700}
.delta.up{color:var(--accent-tx)}
.delta.down{color:var(--down)}
.delta.flat{color:var(--faint)}
.delta .pct{font-weight:600;opacity:.85}
.delta .pct.ov{color:var(--over)}
.hero .memo{
  margin-top:11px;padding-top:10px;
  border-top:1px solid var(--line);
  max-height:22vh;overflow-y:auto;overscroll-behavior:contain;
  font-size:13.5px;line-height:1.6;color:var(--gray);
  white-space:pre-line;word-break:keep-all;overflow-wrap:anywhere;
}
.hero .done{padding:4px 0 2px;font-size:15px;color:var(--gray)}

/* ── 리스트 (가변 영역) ──────────────── */
.sec{
  flex:none;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 2px 6px;
}
.sec b{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--faint)}
.sec span{font-size:11px;color:var(--faint)}
.listwrap{
  position:relative;
  flex:1;min-height:120px;
  overflow-y:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
  margin:0 -8px;padding:0 8px;
  -webkit-mask-image:linear-gradient(180deg,#000 0,#000 calc(100% - 24px),transparent 100%);
  mask-image:linear-gradient(180deg,#000 0,#000 calc(100% - 24px),transparent 100%);
}
.row{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  column-gap:16px;
  padding:13px 12px;
  border-radius:14px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
  transition:opacity .18s;
}
.row:active{background:rgba(255,255,255,.05)}
.row.past{opacity:.35}
.row.cur{
  background:rgba(95,75,139,.16);
  border-bottom-color:transparent;
  box-shadow:inset 2px 0 0 var(--accent-tx);
}
.row .meta{font-size:11.5px;font-weight:600;color:var(--faint);margin-bottom:3px}
.row .meta .tag{color:var(--accent-tx);margin-left:6px;letter-spacing:.08em}
.row .title{
  font-size:15px;font-weight:600;line-height:1.35;
  word-break:keep-all;overflow-wrap:anywhere;
}
.row .artist{font-size:12.5px;color:var(--gray);margin-top:2px}
.row .side{text-align:right;padding-top:17px}
.row .bpm{font-size:19px;font-weight:700;line-height:1}
.row .side .delta{display:block;font-size:10.5px;margin-top:4px}
.row .memo{
  grid-column:1/-1;
  margin-top:8px;
  font-size:12.5px;line-height:1.6;color:var(--gray);
  white-space:pre-line;word-break:keep-all;overflow-wrap:anywhere;
}
.empty{padding:40px 0;text-align:center;color:var(--faint);font-size:14px}

/* ── 하단 고정 컨트롤 ────────────────── */
.controls{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  max-width:560px;margin:0 auto;
  display:flex;gap:10px;
  padding:14px 20px calc(14px + env(safe-area-inset-bottom));
  background:rgba(14,15,18,.92);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
}
.btn{
  height:54px;
  border:none;border-radius:14px;
  font-family:var(--sans);
  font-size:15.5px;font-weight:700;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s;
}
.btn:disabled{opacity:.35;cursor:default}
.btn-back{flex:1;background:none;border:1px solid var(--line);color:var(--gray)}
.btn-next{flex:2;background:var(--accent);color:#fff}
.btn-next:active:not(:disabled){opacity:.85}
.btn-back:active:not(:disabled){opacity:.7}
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>Vinyl Mixset</h1>
    <div class="h-right">
      <button class="chip" id="wake" hidden>화면유지 OFF</button>
      <span class="chip num" id="count"></span>
    </div>
  </header>

  <div class="nowcard" id="nowcard"></div>
  <div class="hero" id="hero"></div>

  <div class="sec"><b>SETLIST</b><span class="num" id="sync">불러오는 중…</span></div>
  <div class="listwrap" id="listwrap">
    <main id="list"></main>
  </div>

</div>

<div class="controls">
  <button class="btn btn-back" id="btnBack">이전</button>
  <button class="btn btn-next" id="btnNext">셋 시작</button>
</div>

<script>
/* ═══ Apps Script 배포 URL ═══ */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgamll5_pbVCplJW5iHLpGhNpRiJtrNwNYWn0Xau9i6NZMHduAmWvAQ9rZ6_GYLowg/exec";

const CACHE_KEY = "vinylMixset";
const NOW_KEY = "vinylMixset.now";
let DATA = [], ORDER = [];
let nowIdx = -1; // -1 = 시작 전

const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const hhmm = t => new Date(t).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
const fmtNo = v => { const s = String(v ?? "").trim(); return /^\d+$/.test(s) ? s.padStart(2,"0") : s; };
const posLine = d => [fmtNo(d.no), d.pos].filter(Boolean).join(" · ");

/* ── 셋 순서(No 오름차순) + BPM 델타/피치% ── */
function buildOrder(){
  ORDER = DATA.map((d,i)=>({...d,i})).sort((a,b)=>{
    const na = parseFloat(a.no), nb = parseFloat(b.no);
    const ka = isNaN(na) ? 1e9 + a.i : na, kb = isNaN(nb) ? 1e9 + b.i : nb;
    return ka - kb;
  });
  for(let i=0;i<ORDER.length;i++){
    const cur = parseFloat(ORDER[i].bpm), prev = i>0 ? parseFloat(ORDER[i-1].bpm) : NaN;
    if(!isNaN(cur) && !isNaN(prev)){
      ORDER[i].delta = Math.round((cur-prev)*10)/10;
      /* 이 트랙이 NEXT일 때, 현재 곡 템포에 맞추기 위한 이 판의 페이더 % */
      ORDER[i].pct = Math.round((prev-cur)/cur*1000)/10;
    }else{
      ORDER[i].delta = null; ORDER[i].pct = null;
    }
  }
}
const deltaHtml = d => {
  if(d.delta === null || d.delta === undefined) return "";
  const cls = d.delta>0 ? "up" : d.delta<0 ? "down" : "flat";
  const sign = v => v>0 ? "+"+v : String(v);
  let pct = "";
  if(d.pct !== null){
    const ov = Math.abs(d.pct) > 8 ? " ov" : ""; /* ±8% 초과 = 페이더로 매칭 불가 */
    pct = ` <span class="pct${ov}">(${d.delta===0 ? "±0" : sign(d.pct)}%)</span>`;
  }
  return `<span class="delta ${cls} num">${d.delta===0 ? "±0" : sign(d.delta)}${pct}</span>`;
};

/* ── 진행 상태 저장/복원 ── */
function saveNow(){
  if(nowIdx < 0){ localStorage.removeItem(NOW_KEY); return; }
  const t = ORDER[nowIdx];
  localStorage.setItem(NOW_KEY, JSON.stringify({t:t.title, p:t.pos}));
}
function restoreNow(){
  try{
    const s = JSON.parse(localStorage.getItem(NOW_KEY));
    if(!s) return;
    let i = ORDER.findIndex(d => d.title===s.t && d.pos===s.p);
    if(i < 0) i = ORDER.findIndex(d => d.title===s.t);
    nowIdx = i;
  }catch(e){ nowIdx = -1; }
}

/* ── 스테이지 ── */
function renderStage(){
  const n = ORDER.length;
  const cur = nowIdx >= 0 ? ORDER[nowIdx] : null;
  const nxt = ORDER[nowIdx + 1] || null;

  $("count").textContent = cur ? `${nowIdx+1} / ${n}` : `${n}곡`;

  if(cur){
    $("nowcard").className = "nowcard";
    $("nowcard").innerHTML =
      `<div class="top">
        <span class="dot"></span><span class="label">NOW</span>
        <span class="p num">${esc(posLine(cur))}</span>
      </div>
      <div class="body">
        <div class="tw">
          <p class="title">${esc(cur.title)}</p>
          <p class="artist">${esc(cur.artist)}</p>
        </div>
        <span class="bpm num">${esc(cur.bpm)}</span>
      </div>`;
  }else{
    $("nowcard").className = "nowcard ready";
    $("nowcard").innerHTML =
      `<div class="top"><span class="label">READY</span></div>
       <div class="body"><div class="tw"><p class="title">셋 시작 전 — 아래 버튼으로 첫 트랙 시작</p></div></div>`;
  }

  const target = cur ? nxt : ORDER[0];
  if(!n){
    $("hero").innerHTML = `<p class="done">시트에 트랙이 없음</p>`;
  }else if(target){
    $("hero").innerHTML =
      `<div class="hero-top">
        <span class="label">${cur ? "NEXT" : "FIRST"}</span>
        <span class="pos-chip num">${esc(posLine(target))}</span>
      </div>
      <h2 class="title">${esc(target.title)}</h2>
      <p class="artist">${esc(target.artist)}</p>
      <div class="bpmrow">
        <span class="bpm num">${esc(target.bpm)}</span>
        <span class="bpmunit">BPM</span>
        ${cur ? deltaHtml(target) : ""}
      </div>
      ${target.memo ? `<p class="memo">${esc(target.memo)}</p>` : ""}`;
  }else{
    $("hero").innerHTML =
      `<div class="hero-top"><span class="label">END</span></div>
       <p class="done">마지막 트랙 재생 중 — 셋 마무리</p>`;
  }

  $("btnBack").disabled = nowIdx < 0;
  const bn = $("btnNext");
  if(!n){ bn.disabled = true; bn.textContent = "다음 트랙"; }
  else if(nowIdx < 0){ bn.disabled = false; bn.textContent = "셋 시작"; }
  else if(nxt){ bn.disabled = false; bn.textContent = "다음 트랙"; }
  else { bn.disabled = true; bn.textContent = "셋 종료"; }
}

/* ── 리스트 ── */
function renderList(){
  if(!ORDER.length){
    $("list").innerHTML = `<p class="empty">트랙 없음</p>`;
    return;
  }
  let html = "";
  ORDER.forEach((d,i)=>{
    const cls = i===nowIdx ? "cur" : (nowIdx>=0 && i<nowIdx) ? "past" : "";
    const tag = i===nowIdx ? `<span class="tag">NOW</span>` : (nowIdx>=0 && i===nowIdx+1) ? `<span class="tag">NEXT</span>` : "";
    html += `
    <article class="row ${cls}" data-i="${i}">
      <div>
        <p class="meta num">${esc(posLine(d))}${tag}</p>
        <h3 class="title">${esc(d.title)}</h3>
        <p class="artist">${esc(d.artist)}</p>
      </div>
      <div class="side">
        <div class="bpm num">${esc(d.bpm)}</div>
        ${deltaHtml(d)}
      </div>
      ${d.memo ? `<p class="memo">${esc(d.memo)}</p>` : ""}
    </article>`;
  });
  $("list").innerHTML = html;
}

/* 현재 트랙을 리스트 창 안에서만 중앙 정렬 (페이지 스크롤 영향 없음) */
function followCur(smooth){
  requestAnimationFrame(()=>{
    const wrap = $("listwrap");
    const el = wrap.querySelector(".row.cur") || wrap.querySelector(".row");
    if(!el) return;
    /* 컨테이너 기준 상대 위치로 계산 — offsetParent 영향 제거 */
    const rel = el.getBoundingClientRect().top - wrap.getBoundingClientRect().top + wrap.scrollTop;
    const max = wrap.scrollHeight - wrap.clientHeight;
    const top = Math.max(0, Math.min(max, rel - (wrap.clientHeight - el.offsetHeight) / 2));
    wrap.scrollTo({top, behavior:smooth ? "smooth" : "auto"});
  });
}

function update(smooth){
  renderStage();
  renderList();
  followCur(smooth);
}
function setNow(i){
  nowIdx = Math.max(-1, Math.min(i, ORDER.length - 1));
  saveNow();
  update(true);
}

/* ── 인터랙션 ── */
$("btnNext").addEventListener("click", ()=> setNow(nowIdx + 1));
$("btnBack").addEventListener("click", ()=> setNow(nowIdx - 1));
$("list").addEventListener("click", e => {
  const row = e.target.closest(".row");
  if(!row) return;
  setNow(+row.dataset.i);
});

/* ── Wake Lock ── */
let wakeLock = null, wakeIntent = false;
async function acquireWake(){
  try{
    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", ()=>{ wakeLock = null; });
    return true;
  }catch(e){ return false; }
}
function wakeUI(){
  $("wake").classList.toggle("on", wakeIntent);
  $("wake").textContent = "화면유지 " + (wakeIntent ? "ON" : "OFF");
}
if("wakeLock" in navigator){
  $("wake").hidden = false;
  $("wake").addEventListener("click", async ()=>{
    if(wakeIntent){
      wakeIntent = false;
      if(wakeLock){ wakeLock.release(); wakeLock = null; }
    }else{
      wakeIntent = await acquireWake();
    }
    wakeUI();
  });
  document.addEventListener("visibilitychange", async ()=>{
    if(wakeIntent && document.visibilityState === "visible" && !wakeLock){
      wakeIntent = await acquireWake();
      wakeUI();
    }
  });
}

/* ── 데이터 로드 ── */
async function load(){
  const cached = (()=>{ try{ return JSON.parse(localStorage.getItem(CACHE_KEY)); }catch(e){ return null; } })();

  const apply = (tracks, syncMsg) => {
    DATA = tracks || [];
    buildOrder();
    restoreNow();
    $("sync").textContent = syncMsg;
    update(false);
  };

  if(!SCRIPT_URL){
    apply(cached ? cached.tracks : [], cached ? "캐시 " + hhmm(cached.t) : "URL 미설정");
    return;
  }

  try{
    const r = await fetch(SCRIPT_URL);
    const j = await r.json();
    localStorage.setItem(CACHE_KEY, JSON.stringify({t:Date.now(), tracks:j.tracks || []}));
    apply(j.tracks, "동기화 " + hhmm(Date.now()));
  }catch(e){
    if(cached) apply(cached.tracks, "오프라인 · " + hhmm(cached.t));
    else apply([], "불러오기 실패");
  }
}

load();
</script>
</body>
</html>
