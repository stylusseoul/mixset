<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<title>Crate Notes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#000;
  --line:#1a1a1a;
  --ink:#fff;
  --gray:#8a8a8a;
  --memo:#9c9c9c;
  --faint:#5c5c5c;
  --sans:'Pretendard Variable',Pretendard,-apple-system,system-ui,'Apple SD Gothic Neo',sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#000;min-height:100%;overscroll-behavior-y:none}
html{color-scheme:dark}
body{
  color:var(--ink);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:560px;margin:0 auto;padding:0 20px calc(48px + env(safe-area-inset-bottom))}

/* ── header ─────────────────────────── */
header{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:26px 0 18px;
}
h1{font-size:17px;font-weight:700;letter-spacing:-.01em}
.count{font-size:13px;color:var(--faint);font-variant-numeric:tabular-nums}

/* ── controls (sticky) ──────────────── */
.controls{
  position:sticky;top:0;z-index:10;
  background:var(--bg);
  padding:2px 0 0;
}
.search{
  width:100%;
  background:none;
  border:1px solid #262626;
  border-radius:8px;
  padding:11px 14px;
  color:var(--ink);
  font-family:var(--sans);
  font-size:16px; /* iOS 확대 방지 */
}
.search::placeholder{color:var(--faint)}
.search:focus{outline:none;border-color:#4a4a4a}
.sorts{
  display:flex;gap:22px;
  padding:14px 2px 12px;
  border-bottom:1px solid var(--line);
}
.sort{
  background:none;border:none;cursor:pointer;
  font-family:var(--sans);
  font-size:13px;
  color:var(--faint);
  padding:0;
}
.sort[aria-pressed="true"]{color:var(--ink);font-weight:600}

/* ── crate divider ──────────────────── */
.crate{
  display:flex;align-items:center;gap:14px;
  padding:30px 0 2px;
}
.crate span{
  font:500 12px/1 var(--mono);
  color:var(--faint);
}
.crate i{flex:1;height:1px;background:var(--line)}

/* ── card ───────────────────────────── */
.card{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  column-gap:20px;
  padding:18px 0;
  border-bottom:1px solid var(--line);
}
.main{min-width:0}
.pos{
  font:500 11.5px/1 var(--mono);
  color:var(--faint);
  display:block;
  margin-bottom:7px;
}
.title{
  font-size:16.5px;
  font-weight:600;
  line-height:1.35;
  letter-spacing:-.01em;
  word-break:keep-all;
  overflow-wrap:anywhere;
}
.artist{
  font-size:13px;
  color:var(--gray);
  margin-top:3px;
}
.bpm{
  font-size:27px;
  font-weight:700;
  line-height:1;
  font-variant-numeric:tabular-nums;
  letter-spacing:-.02em;
  padding-top:22px; /* pos 라인 높이만큼 내려 타이틀과 정렬 */
  text-align:right;
}
.memo{
  grid-column:1/-1;
  margin-top:10px;
  font-size:13.5px;
  line-height:1.62;
  color:var(--memo);
  white-space:pre-line;
  word-break:keep-all;
  overflow-wrap:anywhere;
}

/* ── etc ────────────────────────────── */
.empty{
  padding:64px 0;
  text-align:center;
  color:var(--faint);
  font-size:14px;
}
footer{
  padding-top:32px;
  font-size:11px;
  color:#3a3a3a;
  text-align:center;
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Crate Notes</h1>
    <span class="count" id="count"></span>
  </header>

  <div class="controls">
    <input class="search" id="q" type="search" placeholder="곡명 · 아티스트 · 메모 검색" autocomplete="off">
    <div class="sorts" id="sorts" role="group" aria-label="정렬">
      <button class="sort" data-sort="sheet">시트순</button>
      <button class="sort" data-sort="pos" aria-pressed="true">위치</button>
      <button class="sort" data-sort="bpm">BPM</button>
      <button class="sort" data-sort="artist">아티스트</button>
    </div>
  </div>

  <main id="list"></main>

  <footer id="sync">불러오는 중…</footer>
</div>

<script>
/* ═══ 여기에 Apps Script 배포 URL 붙여넣기 ═══ */
const SCRIPT_URL = "";

const CACHE_KEY = "crateNotes";
let DATA = [];
let q = "", sort = "pos";

const $list = document.getElementById("list");
const $count = document.getElementById("count");
const $sync = document.getElementById("sync");
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const hhmm = t => new Date(t).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
const fmtNo = v => { const s = String(v ?? "").trim(); return /^\d+$/.test(s) ? s.padStart(2,"0") : s; };

/* 위치 자연정렬: A10이 A2 뒤에 오도록 */
const posKey = p => {
  const m = /^([A-Za-z]+)\s*(\d+)/.exec(p || "");
  return m ? [m[1].toUpperCase(), +m[2]] : ["\uffff", 999];
};

function render(){
  const kw = q.trim().toLowerCase();
  let rows = DATA.map((d,i)=>({...d,i})).filter(d =>
    !kw ||
    String(d.title).toLowerCase().includes(kw) ||
    String(d.artist).toLowerCase().includes(kw) ||
    String(d.memo).toLowerCase().includes(kw) ||
    String(d.pos).toLowerCase().includes(kw) ||
    String(d.no).toLowerCase().includes(kw)
  );

  if(sort==="pos") rows.sort((a,b)=>{
    const [la,na]=posKey(a.pos),[lb,nb]=posKey(b.pos);
    return la===lb ? na-nb : la<lb?-1:1;
  });
  else if(sort==="bpm") rows.sort((a,b)=>(parseFloat(a.bpm)||999)-(parseFloat(b.bpm)||999));
  else if(sort==="artist") rows.sort((a,b)=>String(a.artist).localeCompare(String(b.artist),'ja'));
  else rows.sort((a,b)=>{
    const na = parseFloat(a.no), nb = parseFloat(b.no);
    const ka = isNaN(na) ? 1e9 + a.i : na, kb = isNaN(nb) ? 1e9 + b.i : nb;
    return ka - kb;
  });

  $count.textContent = rows.length + "곡";

  if(!rows.length){
    $list.innerHTML = `<p class="empty">${kw ? `'${esc(q)}' 일치하는 트랙 없음` : "트랙 없음"}</p>`;
    return;
  }

  let html = "", crate = null;
  for(const d of rows){
    if(sort==="pos"){
      const letter = posKey(d.pos)[0];
      if(letter !== crate){
        crate = letter;
        html += `<div class="crate"><span>${esc(letter)}</span><i></i></div>`;
      }
    }
    const posLine = [fmtNo(d.no), d.pos].filter(Boolean).join(" · ");
    html += `
    <article class="card">
      <div class="main">
        <span class="pos">${esc(posLine)}</span>
        <h2 class="title">${esc(d.title)}</h2>
        <p class="artist">${esc(d.artist)}</p>
      </div>
      <div class="bpm">${esc(d.bpm)}</div>
      ${d.memo ? `<p class="memo">${esc(d.memo)}</p>` : ""}
    </article>`;
  }
  $list.innerHTML = html;
}

async function load(){
  const cached = (()=>{ try{ return JSON.parse(localStorage.getItem(CACHE_KEY)); }catch(e){ return null; } })();

  if(!SCRIPT_URL){
    if(cached){ DATA = cached.tracks; $sync.textContent = "캐시 · " + hhmm(cached.t); }
    else $sync.textContent = "SCRIPT_URL 미설정";
    render();
    return;
  }

  try{
    const r = await fetch(SCRIPT_URL);
    const j = await r.json();
    DATA = j.tracks || [];
    localStorage.setItem(CACHE_KEY, JSON.stringify({t:Date.now(), tracks:DATA}));
    $sync.textContent = "동기화 " + hhmm(Date.now());
  }catch(e){
    if(cached){
      DATA = cached.tracks;
      $sync.textContent = "오프라인 · " + hhmm(cached.t) + " 캐시";
    }else{
      $sync.textContent = "불러오기 실패 — 네트워크 확인";
    }
  }
  render();
}

document.getElementById("q").addEventListener("input", e => { q = e.target.value; render(); });
document.getElementById("sorts").addEventListener("click", e => {
  const btn = e.target.closest(".sort");
  if(!btn) return;
  sort = btn.dataset.sort;
  document.querySelectorAll(".sort").forEach(p => p.setAttribute("aria-pressed", p===btn));
  render();
});

load();
</script>
</body>
</html>
